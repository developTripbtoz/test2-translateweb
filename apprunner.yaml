# ============================================
# App Runner 설정 파일
# 지원 런타임: python311, nodejs22, corretto8, corretto11
# 사용할 언어에 맞게 수정하세요
# ============================================

version: 1.0
runtime: python311

build:
  commands:
    pre-build:
      - python3 --version

run:
  pre-run:
    - pip3 install --upgrade pip
    - pip3 install -r requirements.txt
  command: gunicorn --bind 0.0.0.0:5000 --timeout 300 app:app
  network:
    port: 5000

