<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화면 캡쳐 번역기</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>📸 화면 캡쳐 번역기</h1>
        <p class="subtitle">
            <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>X</kbd> 또는 아래 버튼으로 화면을 캡쳐하세요
        </p>

        <div class="actions">
            <button id="captureBtn" class="btn btn-primary">📷 화면 캡쳐</button>
            <label class="btn btn-secondary" for="fileInput">📁 이미지 업로드</label>
            <input type="file" id="fileInput" accept="image/*" hidden>
        </div>

        <div class="lang-select">
            <label for="sourceLang">원본 언어:</label>
            <select id="sourceLang">
                <option value="auto">자동 감지</option>
                <option value="en">영어</option>
                <option value="ja">일본어</option>
                <option value="zh-CN">중국어(간체)</option>
                <option value="zh-TW">중국어(번체)</option>
                <option value="fr">프랑스어</option>
                <option value="de">독일어</option>
                <option value="es">스페인어</option>
                <option value="pt">포르투갈어</option>
                <option value="ru">러시아어</option>
                <option value="vi">베트남어</option>
                <option value="th">태국어</option>
            </select>
        </div>

        <div id="preview" class="preview" style="display:none;">
            <h3>캡쳐된 이미지</h3>
            <canvas id="canvas"></canvas>
        </div>

        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p id="loadingText">텍스트 인식 중...</p>
        </div>

        <div id="result" class="result" style="display:none;">
            <div class="result-box">
                <h3>🔍 인식된 텍스트 (원문)</h3>
                <pre id="originalText"></pre>
            </div>
            <div class="result-box translated">
                <h3>🇰🇷 한국어 번역</h3>
                <pre id="translatedText"></pre>
            </div>
        </div>
    </div>

    <!-- 크롭 오버레이 -->
    <div id="cropOverlay" class="crop-overlay" style="display:none;">
        <canvas id="cropCanvas"></canvas>
        <div id="selection" class="selection"></div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
